<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Canvas Pentagrama Inteligente v4</title>
<style>
  :root{
    --panel:#0b1220; --panel2:#111827; --accent:#2563eb; --white:#fff;
    --toolbar-h:46px; --hint-h:26px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0; font-family:Arial, Helvetica, sans-serif; background:#cfd3dc; color:#111827; overflow:hidden;}
  body{display:flex; flex-direction:column;}
  .toolbar{
    height:var(--toolbar-h); min-height:var(--toolbar-h); width:100%;
    background:linear-gradient(180deg,#111827,#07111f); color:#fff;
    display:flex; align-items:center; gap:5px; overflow-x:auto; overflow-y:hidden;
    padding:4px 6px; white-space:nowrap; box-shadow:0 2px 10px rgba(0,0,0,.35); z-index:20;
    scrollbar-width:thin;
  }
  .toolbar::-webkit-scrollbar{height:5px;}
  .toolbar::-webkit-scrollbar-thumb{background:#4b5563; border-radius:999px;}
  /* Modal de hojas */
  .pagesModal{display:none; position:fixed; inset:0; z-index:80; background:rgba(0,0,0,.55); align-items:center; justify-content:center;}
  .pagesModal.open{display:flex;}
  .pagesModalBox{background:#1e293b; color:#f1f5f9; border-radius:14px; padding:18px; min-width:280px; max-width:360px; box-shadow:0 20px 60px rgba(0,0,0,.5);}
  .pagesModalBox h3{margin:0 0 12px; font-size:15px; color:#bfdbfe;}
  .pagesModalList{list-style:none; padding:0; margin:0 0 12px; max-height:320px; overflow-y:auto;}
  .pagesModalList li{display:flex; align-items:center; gap:8px; padding:7px 8px; border-radius:8px; cursor:pointer; font-size:13px;}
  .pagesModalList li:hover{background:rgba(255,255,255,.08);}
  .pagesModalList li.current{background:rgba(96,165,250,.2); font-weight:700; color:#bfdbfe;}
  .pagesModalList li span.pg-num{min-width:28px; font-size:11px; color:#94a3b8;}
  .pagesModalList li span.pg-preview{flex:1;}
  .pagesModalClose{width:100%; border:0; border-radius:8px; padding:8px; background:#334155; color:#f1f5f9; cursor:pointer; font-size:13px; font-weight:700;}
  .toolgroup{display:inline-flex; align-items:center; gap:4px; background:rgba(255,255,255,.075); padding:3px 4px; border-radius:10px; height:36px; flex:0 0 auto;}
  button,.fakeButton{
    border:0; border-radius:8px; padding:5px 8px; cursor:pointer; background:#f3f4f6; color:#111827;
    font-weight:700; font-size:12px; height:29px; min-width:29px; display:inline-flex; align-items:center; justify-content:center; gap:4px;
    box-shadow:inset 0 -1px 0 rgba(0,0,0,.16); user-select:none;
  }
  button:hover{filter:brightness(.96)}
  button.active{background:#60a5fa;color:#07101f; outline:1px solid #dbeafe;}
  button.danger{background:#fee2e2;color:#991b1b;}
  button.primary{background:#bfdbfe;color:#0f172a;}
  button.small{padding:5px 7px;}
  label{font-size:11px; font-weight:700; opacity:.95; display:inline-flex; align-items:center; gap:4px;}
  input[type="color"]{width:28px;height:28px;border:0;background:transparent;padding:0;cursor:pointer;}
  input[type="range"]{width:78px; accent-color:#60a5fa;}
  input[type="checkbox"]{width:14px;height:14px; accent-color:#60a5fa;}
  .mini{font-size:11px; color:#e5e7eb; opacity:.95; padding:0 2px;}
  .pageTag{font-size:12px; font-weight:800; color:#e5e7eb; min-width:62px; text-align:center;}
  .hint{height:var(--hint-h); min-height:var(--hint-h); display:flex; align-items:center; justify-content:center; font-size:12px; color:#111827; background:#eef2ff; padding:3px 8px; text-align:center; z-index:5;}
  .workspace{flex:1; overflow:hidden; padding:4px; display:flex; justify-content:center; align-items:center; touch-action:none; user-select:none;}
  .sheetWrap{position:relative; width:min(calc((100vh - var(--toolbar-h) - var(--hint-h) - 10px) * 210 / 297), calc(100vw - 10px)); aspect-ratio:210/297;}
  .sheet{
    position:absolute; inset:0; background:#fff center/100% 100% no-repeat; box-shadow:0 12px 35px rgba(0,0,0,.28);
    border-radius:2px; overflow:hidden; touch-action:none;
  }
  .sheet svg{position:absolute; inset:0; width:100%; height:100%; touch-action:none; overflow:visible;}
  .object{cursor:grab; pointer-events:all;}
  .object:active{cursor:grabbing;}
  .selection{pointer-events:none;}
  .selection rect{fill:rgba(37,99,235,.07);stroke:#2563eb;stroke-width:2;stroke-dasharray:10 8;vector-effect:non-scaling-stroke;}
  .selection circle.resize{fill:#2563eb;stroke:#fff;stroke-width:2;vector-effect:non-scaling-stroke;}
  .selection circle.rotate{fill:#16a34a;stroke:#fff;stroke-width:2;vector-effect:non-scaling-stroke;}
  .textEditor{
    position:absolute; z-index:40; min-width:95px; transform:translate(-50%,-50%); background:#fff; border:2px solid #2563eb;
    border-radius:9px; padding:6px; box-shadow:0 10px 28px rgba(0,0,0,.25); display:none;
  }
  .textEditor input{width:165px; border:1px solid #cbd5e1; border-radius:7px; padding:7px; font:18px Arial, Helvetica, sans-serif; outline:none;}
  .textEditor .row{display:flex; gap:5px; margin-top:5px; justify-content:flex-end;}
  .textEditor button{height:27px; font-size:12px;}
  .floatHud{display:none; position:fixed; top:8px; left:50%; transform:translateX(-50%); z-index:60; background:rgba(15,23,42,.55); color:white; border-radius:999px; padding:5px 8px; gap:6px; align-items:center; backdrop-filter:blur(8px);}
  .floatHud button{height:28px; background:rgba(255,255,255,.9);}
  body.focusMode{background:#111827;}
  body.focusMode .toolbar, body.focusMode .hint{display:none !important;}
  body.focusMode .workspace{padding:0; background:#111827;}
  body.focusMode .sheetWrap{width:min(100vw, calc(100vh * 210 / 297)); max-height:100vh;}
  body.focusMode .sheet{box-shadow:none; border-radius:0;}
  body.focusMode .floatHud{display:flex; opacity:.3;}
  body.focusMode .floatHud:hover{opacity:1;}
  @media print{
    .toolbar,.hint,.selection,.textEditor,.floatHud{display:none !important;}
    html,body{background:#fff; overflow:visible;}
    .workspace{padding:0; overflow:visible; display:block;}
    .sheetWrap{width:210mm; height:297mm; margin:0;}
    .sheet{box-shadow:none; border-radius:0;}
  }
</style>
</head>
<body>
  <div class="toolbar" id="toolbar">
    <div class="toolgroup">
      <button class="active" data-tool="select" title="Seleccionar con lápiz/mouse. El dedo solo desmarca o cambia hojas.">↖</button>
      <button data-tool="circle" title="Círculo relleno, tamaño ajustado entre líneas">●</button>
      <button data-tool="xmark" title="X, tamaño ajustado entre líneas">✕</button>
      <button data-tool="bar" title="Palo vertical">│</button>
      <button data-tool="text" title="Texto con teclado">T</button>
      <button data-tool="digit1" title="Número 1">1</button>
      <button data-tool="digit2" title="Número 2">2</button>
      <button data-tool="digit4" title="Número 4">4</button>
      <button data-tool="digit6" title="Número 6">6</button>
      <button data-tool="digit8" title="Número 8">8</button>
      <button class="danger" data-tool="erase" title="Borrar objeto con lápiz/mouse">⌫</button>
    </div>
    <div class="toolgroup">
      <label>Color <input id="color" type="color" value="#000000"></label>
      <label>Tamaño <input id="size" type="range" min="0.55" max="2.5" step="0.05" value="1"></label>
      <span class="mini" id="sizeText">100%</span>
      <label title="Ajusta verticalmente al espacio entre líneas del pentagrama"><input id="snap" type="checkbox" checked> ajustar</label>
    </div>
    <div class="toolgroup">
      <button id="editText" title="Editar texto o número seleccionado">Editar</button>
      <button id="rotLeft" title="Girar izquierda">⟲</button>
      <button id="rotRight" title="Girar derecha">⟳</button>
      <span class="mini" id="rotText">0°</span>
    </div>
    <div class="toolgroup">
      <button id="prevPage" title="Hoja anterior">◀</button>
      <span class="pageTag" id="pageTag">Hoja 1/1</span>
      <button id="nextPage" title="Hoja siguiente; si estás al final crea otra">▶</button>
      <button id="addPage" title="Agregar hoja con el mismo fondo">+ Hoja</button>
      <button id="deletePage" class="danger" title="Eliminar la hoja actual">✕ Hoja</button>
      <button id="listPages" class="primary" title="Ver listado de hojas">📋 Hojas</button>
      <button id="focusMode" title="Ver solo hoja completa y pasar hojas con el dedo">Pantalla</button>
    </div>
    <div class="toolgroup">
      <button id="undo" title="Deshacer">↶</button>
      <button id="clearPage" class="danger" title="Borrar la hoja actual">Limpiar</button>
      <button id="exportPng" class="primary" title="Exportar hoja actual como PNG">PNG</button>
      <button id="exportPdf" class="primary" title="Exportar hoja actual como PDF">PDF</button>
      <button id="exportPdfAll" class="primary" title="Exportar todas las hojas como PDF">PDF todo</button>
    </div>
  </div>
  <div class="hint" id="hint">El dedo no dibuja ni coloca símbolos: sirve para desmarcar y deslizar hojas. Para marcar usa lápiz táctil o mouse. En texto sí puedes tocar para escribir.</div>
  <div class="workspace" id="workspace">
    <div class="sheetWrap" id="sheetWrap">
      <div class="sheet" id="sheet">
        <svg id="board" viewBox="0 0 1373 2048" preserveAspectRatio="none" aria-label="Hoja A4 con pentagrama">
          <g id="objectsLayer"></g>
          <g id="uiLayer"></g>
        </svg>
        <div class="textEditor" id="textEditor">
          <input id="textInput" type="text" autocomplete="off" placeholder="Escribe aquí" />
          <div class="row"><button id="cancelText">Cancelar</button><button id="okText" class="primary">Aceptar</button></div>
        </div>
      </div>
    </div>
  </div>
  <div class="floatHud" id="floatHud"><button id="focusPrev">◀</button><span id="focusPageTag">Hoja 1/1</span><button id="focusNext">▶</button><button id="exitFocus">Salir</button></div>
  <!-- Modal listado de hojas -->
  <div class="pagesModal" id="pagesModal">
    <div class="pagesModalBox">
      <h3 id="pagesModalTitle">Hojas</h3>
      <ul class="pagesModalList" id="pagesModalList"></ul>
      <button class="pagesModalClose" id="pagesModalClose">Cerrar</button>
    </div>
  </div>

  board.addEventListener('pointerup', evt => {
    if(isFinger(evt) && touchSwipe){
      const dx = evt.clientX - touchSwipe.x, dy = evt.clientY - touchSwipe.y;
      if(Math.abs(dx) > 70 && Math.abs(dx) > Math.abs(dy)*1.25){
        if(dx < 0) nextPageOrCreate(); else prevPage();
      }
      touchSwipe = null;
      return;
    }
    if(drag){ drag = null; saveAll(); }
  });
  board.addEventListener('pointercancel', () => { drag = null; touchSwipe = null; });
  board.addEventListener('dblclick', evt => {
    const obj = objectFromTarget(evt.target);
    if(isTextObject(obj)) openTextEditor(Number(obj.dataset.x || 0), Number(obj.dataset.y || 0), obj);
  });

  document.getElementById('editText').addEventListener('click', () => {
    if(isTextObject(selected)) openTextEditor(Number(selected.dataset.x || 0), Number(selected.dataset.y || 0), selected);
  });
  document.getElementById('rotLeft').addEventListener('click', () => rotateSelected(-15));
  document.getElementById('rotRight').addEventListener('click', () => rotateSelected(15));
  document.getElementById('undo').addEventListener('click', restoreUndo);
  document.getElementById('clearPage').addEventListener('click', () => {
    if(!objectsLayer.children.length) return;
    if(confirm('¿Borrar todos los elementos de esta hoja?')){ pushUndo(); objectsLayer.innerHTML=''; deselect(); saveAll(); }
  });
  document.getElementById('prevPage').addEventListener('click', prevPage);
  document.getElementById('nextPage').addEventListener('click', nextPageOrCreate);
  document.getElementById('addPage').addEventListener('click', () => addPage(true));
  document.getElementById('deletePage').addEventListener('click', () => {
    if(pages.length === 1){
      if(confirm('¿Borrar el contenido de la única hoja?')){ pushUndo(); objectsLayer.innerHTML=''; deselect(); saveAll(); }
      return;
    }
    if(confirm(`¿Eliminar la hoja ${currentPage+1}? Esta acción no se puede deshacer con ↶.`)){
      saveCurrentPage();
      pages.splice(currentPage, 1);
      currentPage = Math.min(currentPage, pages.length - 1);
      renderPage(false);
      saveAll();
    }
  });
  document.getElementById('listPages').addEventListener('click', () => {
    saveCurrentPage();
    const modal = document.getElementById('pagesModal');
    const list = document.getElementById('pagesModalList');
    const title = document.getElementById('pagesModalTitle');
    title.textContent = `Hojas (${pages.length} total)`;
    list.innerHTML = '';
    pages.forEach((p, i) => {
      const li = document.createElement('li');
      if(i === currentPage) li.classList.add('current');
      const hasContent = p.html && p.html.trim().length > 0;
      li.innerHTML = `<span class="pg-num">${i+1}</span><span class="pg-preview">${hasContent ? '🎵 Con contenido' : '— Vacía'}</span>${i===currentPage?'<span style="color:#60a5fa;font-size:11px">← actual</span>':''}`;
      li.addEventListener('click', () => { switchPage(i); modal.classList.remove('open'); });
      list.appendChild(li);
    });
    modal.classList.add('open');
  });
  document.getElementById('pagesModalClose').addEventListener('click', () => {
    document.getElementById('pagesModal').classList.remove('open');
  });
  document.getElementById('pagesModal').addEventListener('click', e => {
    if(e.target === document.getElementById('pagesModal'))
      document.getElementById('pagesModal').classList.remove('open');
  });
  document.getElementById('focusPrev').addEventListener('click', prevPage);
  document.getElementById('focusNext').addEventListener('click', nextPageOrCreate);
  document.getElementById('exitFocus').addEventListener('click', () => setFocusMode(false));
  document.getElementById('focusMode').addEventListener('click', () => setFocusMode(true));
  document.addEventListener('keydown', evt => {
    if(evt.key === 'Escape' && body.classList.contains('focusMode')) setFocusMode(false);
    if(!selected || textEditor.style.display === 'block') return;
    if(evt.key === 'Delete' || evt.key === 'Backspace'){ pushUndo(); selected.remove(); deselect(); saveAll(); }
    if(evt.key === '[') rotateSelected(-5);
    if(evt.key === ']') rotateSelected(5);
  });

  async function setFocusMode(on){
    body.classList.toggle('focusMode', on);
    try{
      if(on && document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
      if(!on && document.fullscreenElement) await document.exitFullscreen();
    } catch(e){}
  }

  function loadImage(src){ return new Promise((resolve,reject)=>{ const img = new Image(); img.onload=()=>resolve(img); img.onerror=reject; img.src=src; }); }
  async function renderPageToCanvas(pageIndex=currentPage){
    saveCurrentPage();
    const canvas = document.createElement('canvas');
    canvas.width = VIEW_W; canvas.height = VIEW_H;
    const ctx = canvas.getContext('2d');
    const bg = await loadImage(BG);
    ctx.fillStyle = '#fff'; ctx.fillRect(0,0,VIEW_W,VIEW_H);
    ctx.drawImage(bg,0,0,VIEW_W,VIEW_H);
    const html = pages[pageIndex]?.html || '';
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${VIEW_W} ${VIEW_H}" width="${VIEW_W}" height="${VIEW_H}"><g>${html}</g></svg>`;
    const blob = new Blob([svg], {type:'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    try{
      const overlay = await loadImage(url);
      ctx.drawImage(overlay,0,0,VIEW_W,VIEW_H);
    } finally { URL.revokeObjectURL(url); }
    return canvas;
  }
  function downloadBlob(blob, filename){
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = filename; document.body.appendChild(a); a.click();
    setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();}, 1000);
  }
  document.getElementById('exportPng').addEventListener('click', async () => {
    const c = await renderPageToCanvas(currentPage);
    c.toBlob(blob => downloadBlob(blob, `pentagrama_hoja_${currentPage+1}.png`), 'image/png');
  });
  document.getElementById('exportPdf').addEventListener('click', async () => {
    const c = await renderPageToCanvas(currentPage);
    const jpg = c.toDataURL('image/jpeg', .94);
    downloadBlob(pdfFromJpegs([jpg]), `pentagrama_hoja_${currentPage+1}.pdf`);
  });
  document.getElementById('exportPdfAll').addEventListener('click', async () => {
    const jpgs = [];
    for(let i=0; i<pages.length; i++){
      const c = await renderPageToCanvas(i);
      jpgs.push(c.toDataURL('image/jpeg', .94));
    }
    downloadBlob(pdfFromJpegs(jpgs), `pentagrama_${pages.length}_hojas.pdf`);
  });

  function pdfFromJpegs(dataUrls){
    const pageW = 595.28, pageH = 841.89;
    const encoder = new TextEncoder();
    const chunks = [];
    let offset = 0;
    const offsets = [0];
    function addString(s){ const b = encoder.encode(s); chunks.push(b); offset += b.length; }
    function addBytes(b){ chunks.push(b); offset += b.length; }
    function obj(n, body){ offsets[n]=offset; addString(`${n} 0 obj\n${body}\nendobj\n`); }
    addString('%PDF-1.4\n%\xE2\xE3\xCF\xD3\n');
    const pageCount = dataUrls.length;
    const catalogId = 1, pagesId = 2;
    const pageIds = [], contentIds = [], imageIds = [];
    let id = 3;
    for(let i=0;i<pageCount;i++){ pageIds.push(id++); contentIds.push(id++); imageIds.push(id++); }
    obj(catalogId, `<< /Type /Catalog /Pages ${pagesId} 0 R >>`);
    obj(pagesId, `<< /Type /Pages /Kids [${pageIds.map(x=>x+' 0 R').join(' ')}] /Count ${pageCount} >>`);
    for(let i=0;i<pageCount;i++){
      const data = dataUrls[i].split(',')[1];
      const bin = atob(data);
      const imgBytes = new Uint8Array(bin.length);
      for(let j=0;j<bin.length;j++) imgBytes[j] = bin.charCodeAt(j);
      const content = `q\n${pageW} 0 0 ${pageH} 0 0 cm\n/Im${i} Do\nQ\n`;
      obj(pageIds[i], `<< /Type /Page /Parent ${pagesId} 0 R /MediaBox [0 0 ${pageW} ${pageH}] /Resources << /XObject << /Im${i} ${imageIds[i]} 0 R >> >> /Contents ${contentIds[i]} 0 R >>`);
      obj(contentIds[i], `<< /Length ${content.length} >>\nstream\n${content}endstream`);
      offsets[imageIds[i]] = offset;
      addString(`${imageIds[i]} 0 obj\n<< /Type /XObject /Subtype /Image /Width ${VIEW_W} /Height ${VIEW_H} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${imgBytes.length} >>\nstream\n`);
      addBytes(imgBytes);
      addString('\nendstream\nendobj\n');
    }
    const xref = offset;
    addString(`xref\n0 ${id}\n0000000000 65535 f \n`);
    for(let i=1;i<id;i++) addString(`${String(offsets[i]).padStart(10,'0')} 00000 n \n`);
    addString(`trailer\n<< /Size ${id} /Root ${catalogId} 0 R >>\nstartxref\n${xref}\n%%EOF`);
    return new Blob(chunks, {type:'application/pdf'});
  }

  // Guarda antes de cerrar para no perder hojas.
  window.addEventListener('beforeunload', saveAll);
  loadAll();
  setTool('select');
})();
</script>
